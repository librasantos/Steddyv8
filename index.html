                </div>
                <div style={{...CARD2(focusColor),position:"relative"}}>
                  <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(16px,4vw,18px)",color:"#2C1810",lineHeight:"1.55",marginBottom:"8px"}}>{currentTask.text}</div>

                    }
                  </div>
                </div>

                <div style={{...ROW,marginBottom:"14px"}}>
                  <button style={BTN(focusColor)} onClick={completeTask}>Done ✓</button>
                  <button style={GH()} onClick={()=>setMode("didnt")}>Not yet</button>
                </div>

                <button onClick={()=>{clearInterval(tickRef.current);setRunning(false);stopSound();setSoundOn(false);setMode("interrupted");}} style={{background:"none",border:"none",fontSize:"12px",color:"#A07868",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"block",marginBottom:"16px",minHeight:"36px"}}>

                {activeTasks.length>1&&(
                  <div style={{fontSize:"12px",color:"#A07868",cursor:"pointer",minHeight:"36px",display:"flex",alignItems:"center"}} onClick={()=>setMode("later")}>

                  </div>

              </div>

            {deferred.length>0&&(

              </div>

            <div style={{display:"flex",flexDirection:"column",gap:"10px",alignItems:"center"}}><button style={GH()} onClick={()=>{updateStreak();resetApp();}}>Tomorrow →</button><button onClick={shareApp} style={{background:"none",border:"none",fontSize:"13px",color:"#A07868",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:"36px"}}>Share Steddi with someone 🐬</button></div>
          </div>
        )}

      </div>

      {/* SKIP */}
      {showSkip&&["open","ready"].includes(phase)&&(
        <button style={{position:"fixed",bottom:"max(24px,env(safe-area-inset-bottom,24px))",right:"24px",background:"none",border:"none",fontSize:"11px",color:"#A07868",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",animation:"fadeIn 0.5s ease forwards",minHeight:"44px",minWidth:"44px"}}
          onClick={()=>{clearTimeout(entryRef.current);saved?setPhase("ready"):go("checkin");}}>
          skip
        </button>
      )}

      {/* QUICK CAPTURE — floating during focus */}
      {phase==="focus"&&!quickCapture&&(
        <button onClick={()=>setQuickCapture(true)} aria-label="Quick capture"
          style={{position:"fixed",bottom:"max(80px,calc(env(safe-area-inset-bottom,0px)+80px))",right:"20px",width:"44px",height:"44px",borderRadius:"50%",background:"white",border:`1.5px solid ${focusColor||c}`,boxShadow:"0 2px 12px rgba(0,0,0,0.1)",cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",zIndex:90}}>
          +
        </button>
      )}
      {phase==="focus"&&quickCapture&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget){setQuickCapture(false);setQuickInput("");}}}>
          <div style={{width:"100%",background:"#FBF7F2",borderRadius:"20px 20px 0 0",padding:`20px 20px max(32px,calc(env(safe-area-inset-bottom,0px)+20px))`,animation:"slideUp 0.25s ease forwards"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"17px",color:"#2C1810",marginBottom:"4px"}}>Quick capture</div>

            <div style={{display:"flex",gap:"8px"}}>
              <input autoFocus style={{...INP,flex:1,fontSize:"16px"}} placeholder="What's on your mind?"
                value={quickInput} onChange={e=>setQuickInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&quickInput.trim()){setDumpItems(p=>[{text:quickInput.trim(),id:Date.now(),priority:"should"},...p]);setQuickInput("");setQuickCapture(false);}}}/>
              <button style={{...BTN(focusColor||c),padding:"0 16px",fontSize:"20px",minWidth:"48px"}}
                onClick={()=>{if(quickInput.trim()){setDumpItems(p=>[{text:quickInput.trim(),id:Date.now(),priority:"should"},...p]);setQuickInput("");setQuickCapture(false);}}}>+</button>
            </div>
            <button style={{background:"none",border:"none",fontSize:"13px",color:"#B0A090",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:"12px",minHeight:"36px"}} onClick={()=>{setQuickCapture(false);setQuickInput("");}}>Cancel</button>
          </div>
        </div>
      )}

      {/* DUMP ICON — replaced by tab bar */}
      {false&&!["open","ready","checkin","dump-ask","dump","dump-review","warmup"].includes(phase)&&!dumpOpen&&(
        <button onClick={()=>setDumpOpen(true)} style={{position:"fixed",bottom:"max(24px,env(safe-area-inset-bottom,24px))",right:"24px",width:"50px",height:"50px",borderRadius:"50%",background:"#FFFAF6",border:"1.5px solid #DFF0EC",boxShadow:"0 3px 16px rgba(0,0,0,0.1)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",animation:"fadeIn 0.4s ease forwards"}}>
          📥
          {dumpItems.length>0&&<div style={{position:"absolute",top:"2px",right:"2px",width:"16px",height:"16px",borderRadius:"50%",background:c,fontSize:"9px",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",fontWeight:"500"}}>{dumpItems.length>9?"9+":dumpItems.length}</div>}
        </button>
      )}

      {/* DUMP DRAWER */}
      {dumpOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:200,display:"flex",alignItems:"flex-end",animation:"fadeIn 0.2s ease forwards"}}
          onClick={e=>{if(e.target===e.currentTarget)setDumpOpen(false);}}>
          <div style={{width:"100%",maxHeight:"80vh",background:"#FDF8F3",borderRadius:"20px 20px 0 0",padding:"20px 20px max(32px,env(safe-area-inset-bottom,32px))",overflowY:"auto",animation:"slideUp 0.3s ease forwards"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
              <div style={{fontFamily:"'Lora',serif",fontSize:"20px",color:"#2C1810"}}>Brain dump</div>
              <button onClick={()=>setDumpOpen(false)} style={{background:"none",border:"none",fontSize:"22px",color:"#A07868",cursor:"pointer",minWidth:"44px",minHeight:"44px",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            <div style={{fontSize:"13px",color:"#B09088",marginBottom:"16px"}}>Park anything here. It won't disappear.</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              <input style={{...INP,flex:1,fontSize:"16px"}} placeholder="What's on your mind?" value={dumpInput}
                onChange={e=>setDumpInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}} autoFocus/>
              <button style={{...BTN(c),padding:"0 16px",fontSize:"22px",minWidth:"48px"}} onClick={()=>{if(dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}}>+</button>
            </div>
            {dumpItems.length===0&&<div style={{fontSize:"13px",color:"#A07868",textAlign:"center",padding:"20px 0"}}>Nothing here yet. Add anything.</div>}
            {dumpItems.map(item=>(
              <div key={item.id} style={{padding:"12px 14px",background:"#FFFAF6",border:"1.5px solid #DFF0EC",borderRadius:"12px",marginBottom:"8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                  <span style={{flex:1,fontSize:"14px",color:"#2C1810",fontWeight:"300"}}>{item.text}</span>
                  <button onClick={()=>setDumpItems(p=>p.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"16px",minWidth:"32px",minHeight:"32px"}}>×</button>
                </div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                  {PRIORITIES.map(p=>(
                    <button key={p.key} onClick={()=>setDumpItems(prev=>prev.map(i=>i.id===item.id?{...i,priority:p.key}:i))} style={{padding:"3px 9px",borderRadius:"50px",border:`1.5px solid ${item.priority===p.key?p.color:"#F0E8DF"}`,background:item.priority===p.key?p.bg:"white",color:item.priority===p.key?p.color:"#A07868",fontSize:"10px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>
                      {p.label}
                    </button>
                  ))}
                  {["tasks","focus","select"].includes(phase)&&activeTasks.length<3&&(
                    <button onClick={()=>promoteFromDump(item)} style={{padding:"3px 10px",borderRadius:"50px",background:c+"18",border:"none",color:c,fontSize:"10px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",fontWeight:"500"}}>do today</button>
                  )}
                </div>
              </div>
            ))}
            {dumpItems.length>0&&<button onClick={()=>{if(clearConfirm){setDumpItems([]);setClearConfirm(false);}else{setClearConfirm(true);setTimeout(()=>setClearConfirm(false),3000);}}} style={{background:"none",border:"none",fontSize:"12px",color:"#A07868",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:"12px",minHeight:"36px"}}>{clearConfirm?"Tap again to confirm":"Clear all"}</button>}
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      {!onboarding&&!["open","ready"].includes(phase)&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #F0E8DF",display:"flex",paddingBottom:"max(8px,env(safe-area-inset-bottom,8px))",zIndex:100}}>
          {[{id:"focus",icon:"🎯",label:"Focus"},{id:"backlog",icon:"📥",label:"Backlog",badge:dumpItems.length},{id:"calendar",icon:"📅",label:"Calendar"},{id:"settings",icon:"⚙️",label:"Settings"}].map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 4px",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",position:"relative",minHeight:"56px"}}>

              <div style={{fontSize:"10px",fontWeight:activeTab===tab.id?"500":"300",color:activeTab===tab.id?c:"#B0A090",letterSpacing:"0.3px"}}>{tab.label}</div>
              {tab.badge>0&&<div style={{position:"absolute",top:"6px",right:"calc(50% - 20px)",width:"16px",height:"16px",borderRadius:"50%",background:c,fontSize:"9px",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"600"}}>{tab.badge>9?"9+":tab.badge}</div>}
            </button>
          ))}
        </div>
      )}

      {/* BACKLOG TAB */}
      {!onboarding&&activeTab==="backlog"&&!["open","ready"].includes(phase)&&(
        <div style={{position:"fixed",inset:0,background:"#FBF7F2",zIndex:50,display:"flex",flexDirection:"column",paddingTop:"max(20px,env(safe-area-inset-top,20px))",paddingBottom:"max(72px,calc(env(safe-area-inset-bottom,0px)+72px))"}}>
          <div style={{padding:"0 20px 16px",borderBottom:"1px solid #F0E8DF"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"22px",color:"#2C1810",marginBottom:"4px"}}>Your backlog</div>
            <div style={{fontSize:"13px",color:"#B0A090",fontWeight:"300"}}>Park anything here. It'll wait until you're ready.</div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              <input style={{...INP,flex:1}} placeholder="Add anything on your mind..." value={dumpInput} onChange={e=>setDumpInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}}/>
              <button style={{...BTN(c),padding:"0 16px",fontSize:"22px",minWidth:"48px"}} onClick={()=>{if(dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}}>+</button>
            </div>
            {dumpItems.length===0?(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:"40px",marginBottom:"12px"}}>📥</div>
                <div style={{fontFamily:"'Lora',serif",fontSize:"17px",color:"#2C1810",marginBottom:"8px"}}>Nothing here yet.</div>
                <div style={{fontSize:"13px",color:"#B0A090",fontWeight:"300",lineHeight:"1.6"}}>Add tasks, ideas, worries — anything. They'll wait until you're ready.</div>
              </div>
            ):(
              <>
                {dumpItems.map(item=>(
                  <div key={item.id} style={{padding:"12px 14px",background:"white",border:"1.5px solid #F0E8DF",borderRadius:"12px",marginBottom:"8px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                      <span style={{flex:1,fontSize:"14px",color:"#2C1810",fontWeight:"300"}}>{item.text}</span>
                      {activeTasks.length<3&&<button onClick={()=>{setDumpItems(p=>p.filter(i=>i.id!==item.id));setActiveTasks(p=>[...p,{id:Date.now(),text:item.text,priority:item.priority||"should"}]);setActiveTab("focus");}} style={{padding:"4px 10px",borderRadius:"50px",background:c+"18",border:"none",color:c,fontSize:"11px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",fontWeight:"500",whiteSpace:"nowrap"}}>+ today</button>}
                      <button onClick={()=>setDumpItems(p=>p.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"16px",minWidth:"32px",minHeight:"32px"}}>×</button>
                    </div>
                    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      {PRIORITIES.map(p=>(<button key={p.key} onClick={()=>setDumpItems(prev=>prev.map(i=>i.id===item.id?{...i,priority:p.key}:i))} style={{padding:"3px 9px",borderRadius:"50px",border:`1.5px solid ${item.priority===p.key?p.color:"#F0E8DF"}`,background:item.priority===p.key?p.bg:"white",color:item.priority===p.key?p.color:"#B0A090",fontSize:"10px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>{p.label}</button>))}
                    </div>
                  </div>
                ))}
                <button onClick={()=>{if(clearConfirm){setDumpItems([]);setClearConfirm(false);}else{setClearConfirm(true);setTimeout(()=>setClearConfirm(false),3000);}}} style={{background:"none",border:"none",fontSize:"12px",color:"#B0A090",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:"4px",minHeight:"36px"}}>{clearConfirm?"Tap again to confirm":"Clear all"}</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* SETTINGS TAB */}
      {/* CALENDAR TAB */}
      {!onboarding&&activeTab==="calendar"&&!["open","ready"].includes(phase)&&(()=>{
        // Build task map: date string → [{text, type, duration, recur, color}]
        const taskMap = {};
        const addToMap = (dateStr, task, type) => {
          if(!dateStr) return;
          if(!taskMap[dateStr]) taskMap[dateStr]=[];
          taskMap[dateStr].push({...task, type});
        };

        // Deferred tasks
        deferred.forEach(t => addToMap(t.date, t, "deferred"));

        // Recurring tasks — project 60 days forward
        const today = new Date(); today.setHours(0,0,0,0);
        [...activeTasks,...allTasks].filter(t=>t.recur).forEach(t=>{
          for(let i=0;i<60;i++){
            const d = new Date(today); d.setDate(d.getDate()+i);
            const dow = d.getDay();
            const ds = d.toISOString().split("T")[0];
            if(t.recur==="daily") addToMap(ds,t,"recur");
            else if(t.recur==="weekdays"&&dow>=1&&dow<=5) addToMap(ds,t,"recur");
            else if(t.recur==="weekly"&&dow===today.getDay()) addToMap(ds,t,"recur");
          }
        });

        // Calendar grid
        const {y,m} = calMonth;
        const firstDay = new Date(y,m,1).getDay();
        const daysInMonth = new Date(y,m+1,0).getDate();
        const todayStr = today.toISOString().split("T")[0];
        const monthName = new Date(y,m,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

        // Selected day tasks
        const selTasks = calSelected ? (taskMap[calSelected]||[]) : [];

        return(
          <div style={{position:"fixed",inset:0,background:th.bg,zIndex:50,display:"flex",flexDirection:"column",paddingTop:"max(20px,env(safe-area-inset-top,20px))",paddingBottom:"max(72px,calc(env(safe-area-inset-bottom,0px)+72px))"}}>
            {/* Header */}
            <div style={{padding:"0 20px 12px",borderBottom:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <button onClick={()=>setCalMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:th.muted,minWidth:"36px",minHeight:"36px"}}>‹</button>
              <div style={{fontFamily:"'Lora',serif",fontSize:"18px",color:th.text}}>{monthName}</div>
              <button onClick={()=>setCalMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:th.muted,minWidth:"36px",minHeight:"36px"}}>›</button>
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
              {/* Day labels */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"4px"}}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
                  <div key={d} style={{textAlign:"center",fontSize:"11px",color:th.muted,fontWeight:"500",padding:"4px 0"}}>{d}</div>
                ))}
              </div>

              {/* Calendar grid */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"16px"}}>
                {Array.from({length:firstDay},(_,i)=><div key={"e"+i}/>)}
                {Array.from({length:daysInMonth},(_,i)=>{
                  const day=i+1;
                  const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                  const tasks=taskMap[ds]||[];
                  const isToday=ds===todayStr;
                  const isSel=ds===calSelected;
                  const hasDeferred=tasks.some(t=>t.type==="deferred");
                  const hasRecur=tasks.some(t=>t.type==="recur");
                  return(
                    <button key={ds} onClick={()=>setCalSelected(isSel?null:ds)}
                      style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:"10px",border:"none",cursor:"pointer",background:isSel?th.primary:isToday?th.primary+"18":"transparent",color:isSel?"white":isToday?th.primary:th.text,fontFamily:"'DM Sans',sans-serif",fontSize:fs.body,fontWeight:isToday||isSel?"600":"300",position:"relative",padding:"4px"}}>
                      {day}
                      {tasks.length>0&&(
                        <div style={{display:"flex",gap:"2px",marginTop:"2px"}}>
                          {hasDeferred&&<div style={{width:5,height:5,borderRadius:"50%",background:isSel?"white":th.primary}}/>}
                          {hasRecur&&<div style={{width:5,height:5,borderRadius:"50%",background:isSel?"white":"#5BAD7F"}}/>}
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* Selected day detail */}
              {calSelected&&(
                <div style={{animation:"slideUp 0.2s ease forwards"}}>
                  <div style={{fontFamily:"'Lora',serif",fontSize:"16px",color:th.text,marginBottom:"10px"}}>
                    {new Date(calSelected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
                  </div>
                  {selTasks.length===0?(
                    <div style={{fontSize:"13px",color:th.muted,fontStyle:"italic"}}>Nothing scheduled.</div>
                  ):selTasks.map((t,i)=>(
                    <div key={i} style={{padding:"12px 14px",background:"white",border:`1.5px solid ${th.border}`,borderRadius:"12px",marginBottom:"8px",display:"flex",alignItems:"flex-start",gap:"10px"}}>
                      <div style={{fontSize:"16px",flexShrink:0}}>{t.type==="recur"?"🔁":"📌"}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:fs.body,color:th.text,fontWeight:"400",marginBottom:"4px"}}>{t.text}</div>
                        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                          {t.time&&<span style={{fontSize:"11px",color:th.muted}}>⏰ {new Date("2000-01-01T"+t.time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>}
                          {t.duration&&<span style={{fontSize:"11px",color:th.muted}}>⏱ {t.duration}min</span>}
                          {t.recur&&<span style={{fontSize:"11px",color:"#5BAD7F"}}>{t.recur==="daily"?"Daily":t.recur==="weekdays"?"Weekdays":"Weekly"}</span>}
                          <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:"50px",background:PRIORITIES.find(p=>p.key===t.priority)?.bg||"#F0E8DF",color:PRIORITIES.find(p=>p.key===t.priority)?.color||th.muted}}>{PRIORITIES.find(p=>p.key===t.priority)?.label||"Should do"}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {!calSelected&&(
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontSize:"28px",marginBottom:"8px"}}>📅</div>
                  <div style={{fontSize:"13px",color:th.muted,fontWeight:"300"}}>Tap any day to see what's scheduled.</div>
                  <div style={{fontSize:"11px",color:th.muted,marginTop:"6px"}}>🔵 Deferred tasks · 🟢 Recurring tasks</div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* SETTINGS TAB */}
      {!onboarding&&activeTab==="settings"&&!["open","ready"].includes(phase)&&(
        <div style={{position:"fixed",inset:0,background:"#FBF7F2",zIndex:50,display:"flex",flexDirection:"column",paddingTop:"max(20px,env(safe-area-inset-top,20px))",paddingBottom:"max(72px,calc(env(safe-area-inset-bottom,0px)+72px))"}}>
          <div style={{padding:"0 20px 16px",borderBottom:"1px solid #F0E8DF"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"22px",color:"#2C1810"}}>Settings</div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
            <div style={{marginBottom:"24px"}}>
              <span style={LBL}>Your name</span>
              <input style={INP} placeholder="So Steddi can greet you..." value={userName} onChange={e=>{setUserName(e.target.value);try{localStorage.setItem("steddi_name",e.target.value);}catch(err){}}}/>
            </div>

            {/* Theme picker */}
            <div style={{marginBottom:"24px"}}>
              <span style={LBL}>Theme</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"8px"}}>
                {Object.entries(THEMES).map(([key,t])=>(
                  <button key={key} onClick={()=>saveTheme(key)}
                    style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",borderRadius:"12px",border:`2px solid ${theme===key?t.primary:"#F0E8DF"}`,background:theme===key?t.primary+"15":"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:"13px",color:theme===key?t.primary:"#A09888",minHeight:"44px",transition:"all 0.15s"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:t.primary,flexShrink:0}}/>
                    {t.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Font size picker */}
            <div style={{marginBottom:"24px"}}>
              <span style={LBL}>Text size</span>
              <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
                {[["small","A","Small"],["medium","A","Medium"],["large","A","Large"]].map(([key,_,label],i)=>(
                  <button key={key} onClick={()=>saveFontSize(key)}
                    style={{flex:1,padding:"12px 8px",borderRadius:"12px",border:`2px solid ${fontSize===key?th.primary:"#F0E8DF"}`,background:fontSize===key?th.primary+"15":"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",color:fontSize===key?th.primary:"#A09888",fontSize:[13,16,20][i],fontWeight:"500",minHeight:"52px",transition:"all 0.15s"}}>
                    A<br/><span style={{fontSize:"10px",fontWeight:"300"}}>{label}</span>
                  </button>
                ))}
              </div>
            </div>
            {streak>0&&<div style={{padding:"14px 16px",background:"white",border:"1.5px solid #F0E8DF",borderRadius:"14px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"12px"}}><span style={{fontSize:"24px"}}>🔥</span><div><div style={{fontSize:"15px",color:"#2C1810",fontWeight:"500"}}>{streak} day streak</div><div style={{fontSize:"12px",color:"#B0A090",fontWeight:"300"}}>Keep showing up.</div></div></div>}
            <button onClick={()=>{try{localStorage.removeItem("steddi_onboarded");}catch(e){}setOnboarding(true);setOnboardStep(0);setActiveTab("focus");}} style={{width:"100%",padding:"14px 16px",background:"white",border:"1.5px solid #F0E8DF",borderRadius:"14px",fontSize:"14px",color:"#2C1810",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",textAlign:"left",marginBottom:"10px"}}>👋 Restart intro tour</button>
            <button onClick={()=>{if(clearDataConfirm){try{localStorage.clear();}catch(e){}setDumpItems([]);setActiveTasks([]);setAllTasks([]);setDoneTasks([]);setDeferred([]);setClearDataConfirm(false);setActiveTab("focus");resetApp();}else{setClearDataConfirm(true);setTimeout(()=>setClearDataConfirm(false),3000);}}} style={{width:"100%",padding:"14px 16px",background:"white",border:"1.5px solid #F0E8DF",borderRadius:"14px",fontSize:"14px",color:"#C04040",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",textAlign:"left",marginBottom:"10px"}}>{clearDataConfirm?"Tap again — this clears everything":"🗑 Clear all data"}</button>
            <div style={{fontSize:"11px",color:"#C4A898",textAlign:"center",marginTop:"24px"}}>Steddi · One thing at a time 🐬</div>
          </div>
        </div>
      )}

    </div>
  );
}

document.addEventListener('touchstart',_initAudio,{once:true,passive:true});

// Register Service Worker for offline + PWA install
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Steddi/>);
</script>
</body>
</html>
